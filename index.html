    body {
      font-family: Arial;
      background-color: #121212;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* Layout container */
    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
    }

    /* Base AP button style */
    .ap-button {
      background: linear-gradient(135deg, #2193b0, #6dd5ed);
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.25s;
    }

    /* Hover effect */
    .ap-button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 15px rgba(33, 147, 176, 0.6);
    }
  </style>
</head>
