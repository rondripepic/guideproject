<!DOCTYPE html>
<html>
<head>
  <title>guides</title>

  <style>
    body {
      font-family: Arial;
      background-color: #121212;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* Layout container */
    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
    }

    /* Base AP button style */
    .ap-button {
      background: linear-gradient(135deg, #2193b0, #6dd5ed);
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.25s;
    }

    /* Hover effect */
    .ap-button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 15px rgba(33, 147, 176, 0.6);
    }

    .text-box {
      display: none;
      margin: 12px auto 0;
      width: 260px;
      padding: 14px;
      background: #1e1e1e;
      border: 1px solid #2f2f2f;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      color: #e6e6e6;
      font-size: 14px;
      line-height: 1.5;
    }

    .text-box.show {
      display: block;
    }
  </style>
</head>

<body>
  <h1>dropdown menu</h1>

  <button class="ap-button" id="menuButton">Open menu</button>

  <div class="text-box" id="infoBox">
    You clicked the button!
  </div>

    You clicked the button!

    <div class="text-box" id="infoBox">
    You clicked the button!
  </div>
  

  <script>
    const menuButton = document.getElementById("menuButton");
    const infoBox = document.getElementById("infoBox");

    menuButton.addEventListener("click", function (event) {
      event.stopPropagation();
      infoBox.classList.toggle("show");
    });

    document.addEventListener("click", function () {
      infoBox.classList.remove("show");
    });
  </script>
</body>
</html>
